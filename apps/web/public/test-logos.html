<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Logo Test</title>
  <style>
    body { background: #121212; color: white; font-family: sans-serif; margin: 20px; }
    h3 { border-bottom: 1px solid #333; padding-bottom: 5px; }
    .img-container { background: #222; display: inline-block; padding: 20px; border: 1px dashed #555; }
    img { outline: 1px solid red; }
  </style>
</head>
<body>
  <h3>LOGO.png (741x675)</h3>
  <div class="img-container">
    <img src="LOGO.png" alt="LOGO" style="width: 200px;">
  </div>

  <h3>horizontalwithname.png (907x274)</h3>
  <div class="img-container">
    <img src="horizontalwithname.png" alt="Horizontal" style="height: 100px;">
  </div>
</body>
</html>
